name: Daily Quran Short Upload

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo rm /etc/apt/sources.list.d/yarn.list 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto chromium-browser

      - name: Copy fonts
        run: |
          mkdir -p fonts
          cp /usr/share/fonts/truetype/noto/NotoSansArabic-SemiCondensed.ttf fonts/Arabic.ttf 2>/dev/null || true
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf fonts/ 2>/dev/null || true
          wget -q "https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Bold.ttf" -O fonts/ArabicBold.ttf

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install tiktok-uploader playwright
          python -m playwright install chromium

      - name: Fix moviepy PIL compatibility
        run: |
          RESIZE_FILE=$(python -c "import moviepy.video.fx.resize as r; import inspect; print(inspect.getfile(r))")
          sed -i 's/Image.ANTIALIAS/Image.LANCZOS/g' $RESIZE_FILE

      - name: Restore YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - uses: actions/cache@v4
        with:
          path: data/progress.json
          key: quran-progress-${{ github.run_number }}
          restore-keys: quran-progress-

      - name: Run bot
        run: python main.py
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TIKTOK_EMAIL: ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}

      - name: Commit progress
        run: |
          git config user.name "Quran Bot"
          git config user.email "bot@quranshorts.auto"
          git add data/progress.json
          git diff --staged --quiet || git commit -m "progress: $(date +'%Y-%m-%d %H:%M')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
